<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صفحة | متجر العرب</title>
    
    <link rel="icon" type="image/png" href="web-assets/app_icon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Quill Snow CSS for content styling -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script>
        if (localStorage.getItem('theme') !== 'light') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <style>
        .page-content {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 40px;
            margin: 40px auto;
            max-width: 900px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-color);
        }
        .page-content h1, .page-content h2, .page-content h3 {
            color: var(--primary-color);
            margin-bottom: 20px;
        }
        /* Override quill container styling for viewing */
        .ql-editor {
            padding: 0 !important;
            font-size: 1.1rem !important;
            font-family: inherit !important;
            line-height: 1.8 !important;
            color: var(--text-color) !important;
        }
        .ql-editor img {
            max-width: 100%;
            border-radius: 12px;
            margin: 15px 0;
        }
        #not-found {
            text-align: center;
            padding: 50px 20px;
        }
    </style>
    <!-- Google AdSense Auto Ads -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4808414573627321" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="container navbar">
            <div class="logo-wrapper" style="display: flex; align-items: center; gap: 10px;">
                <a href="index.html" class="logo">
                    <img src="web-assets/app_icon.png" alt="متجر العرب" style="width:36px;height:36px;border-radius:10px;margin-left:8px;vertical-align:middle;"> متجر العرب
                </a>
            </div>
            <div class="navbar-actions">
                <a href="index.html" class="btn btn-outline"><i class="fa-solid fa-home"></i> العودة للرئيسية</a>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="page-content ql-snow" id="content-container">
            <div id="dynamic-content" class="ql-editor">
                <div style="text-align: center;"><span class="loader"></span></div>
            </div>
            
            <div id="not-found" class="hidden">
                <i class="fa-solid fa-file-circle-xmark" style="font-size: 4rem; color: var(--danger-color); margin-bottom: 20px;"></i>
                <h2>الصفحة غير موجودة</h2>
                <p style="color: var(--text-secondary); margin-top: 10px;">عذراً، الصفحة التي تبحث عنها غير موجودة أو تم حذفها.</p>
                <a href="index.html" class="btn btn-primary" style="margin-top: 20px;">العودة للرئيسية</a>
            </div>
        </div>
    </main>

    <script type="module">
        import { db } from './js/firebase-config.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        async function loadContent() {
            const urlParams = new URLSearchParams(window.location.search);
            const pageId = urlParams.get('id');
            const isPreview = urlParams.get('preview') === 'true';
            
            const dynamicContent = document.getElementById('dynamic-content');
            const notFound = document.getElementById('not-found');

            if (isPreview) {
                // Load from sessionStorage for live preview before saving
                document.title = (sessionStorage.getItem('page_preview_title') || "معاينة") + " | متجر العرب";
                dynamicContent.innerHTML = sessionStorage.getItem('page_preview_content') || "<p>لا يوجد محتوى للمعاينة</p>";
                return;
            }
            
            if (!pageId) {
                dynamicContent.classList.add('hidden');
                notFound.classList.remove('hidden');
                return;
            }

            try {
                const docSnap = await getDoc(doc(db, "site_pages", pageId));
                if (docSnap.exists() && docSnap.data().content) {
                    const data = docSnap.data();
                    
                    if (data.status === 'draft') {
                        // Hide from public if draft
                        dynamicContent.classList.add('hidden');
                        notFound.classList.remove('hidden');
                        return;
                    }
                    
                    document.title = (data.title || pageId) + " | متجر العرب";
                    dynamicContent.innerHTML = data.content;
                    
                    // Inject SEO Meta Tags
                    if (data.meta_desc) {
                        let metaDesc = document.querySelector('meta[name="description"]');
                        if (!metaDesc) {
                            metaDesc = document.createElement('meta');
                            metaDesc.name = "description";
                            document.head.appendChild(metaDesc);
                        }
                        metaDesc.content = data.meta_desc;
                    }
                    if (data.meta_keywords) {
                        let metaKw = document.querySelector('meta[name="keywords"]');
                        if (!metaKw) {
                            metaKw = document.createElement('meta');
                            metaKw.name = "keywords";
                            document.head.appendChild(metaKw);
                        }
                        metaKw.content = data.meta_keywords;
                    }
                    
                    // Increment views count silently
                    updateDoc(docSnap.ref, { views: increment(1) }).catch(e => console.error("Could not increment views", e));
                    
                } else {
                    dynamicContent.classList.add('hidden');
                    notFound.classList.remove('hidden');
                }
            } catch (error) {
                console.error("Error loading dynamic content:", error);
                dynamicContent.classList.add('hidden');
                notFound.classList.remove('hidden');
            }
        }
        loadContent();
    </script>
    <script type="module" src="js/dynamic-footer.js"></script>
</body>
</html>

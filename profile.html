<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إكمال بيانات المطور | متجر العرب</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background: radial-gradient(circle at top left, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .profile-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .header p {
            color: #fff;
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .validation-status {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.9rem;
            transition: all 0.3s;
            display: none;
        }

        .validation-status.success {
            color: #4ade80;
            display: block;
        }

        .validation-status.error {
            color: #f87171;
            display: block;
        }

        .validation-status i {
            position: static !important;
            transform: none !important;
            color: inherit !important;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #fff;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary-color);
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            outline: none;
            transition: all 0.3s;
            font-size: 0.95rem;
            font-family: 'Cairo', sans-serif;
        }

        .input-wrapper input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 15px rgba(0, 114, 255, 0.2);
        }

        /* Custom Dropdown Styles */
        .custom-dropdown {
            position: relative;
            width: 100%;
            user-select: none;
        }

        .dropdown-trigger {
            width: 100%;
            padding: 12px 45px 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
            font-size: 0.95rem;
            min-height: 48px;
        }

        .dropdown-trigger:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
        }

        .dropdown-trigger i.chevron {
            transition: transform 0.3s;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .custom-dropdown.active .dropdown-trigger i.chevron {
            transform: rotate(180deg);
            color: var(--primary-color);
        }

        .dropdown-options {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            left: 0;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            overflow-y: auto;
            max-height: 250px;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .custom-dropdown.active .dropdown-options {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-option {
            padding: 12px 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            text-align: right;
            font-size: 0.95rem;
        }

        .dropdown-option:hover {
            background: var(--primary-color);
            padding-right: 25px;
        }

        .dropdown-option.selected {
            background: rgba(62, 184, 255, 0.2);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* Scrollbar for options */
        .dropdown-options::-webkit-scrollbar {
            width: 6px;
        }

        .dropdown-options::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 10px;
        }

        input:disabled,
        .dropdown-trigger.disabled {
            background: rgba(255, 255, 255, 0.01) !important;
            color: #666 !important;
            cursor: not-allowed;
            opacity: 0.6;
        }

        #user-phone {
            direction: ltr;
            text-align: right;
            padding-left: 55px !important;
            /* Space for prefix */
        }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color), #0072ff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 114, 255, 0.3);
        }

        .loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="profile-container">
        <div class="header">
            <img src="web-assets/app_icon.png?v=2026" alt="متجر العرب"
                style="width: 80px; height: 80px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);">
            <h1 id="page-title">إكمال ملف المطور</h1>
            <p id="page-desc">يرجى تزويدنا ببياناتك الصحيحة للبدء في نشر تطبيقاتك</p>
        </div>

        <form id="profile-form">
            <div class="form-group">
                <label>الاسم الكامل</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="user-display-name" placeholder="الاسم كما يظهر للمستخدمين" required>
                    <div id="name-status" class="validation-status"></div>
                </div>
            </div>

            <div class="form-group">
                <label>البريد الإلكتروني (غير قابل للتعديل)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="user-email" disabled>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>الدولة</label>
                    <div class="input-wrapper custom-dropdown" id="country-dropdown">
                        <div class="dropdown-trigger">
                            <span class="selected-value">-- اختر الدولة --</span>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </div>
                        <div class="dropdown-options" id="country-options">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>المحافظة</label>
                    <div class="input-wrapper custom-dropdown disabled" id="gov-dropdown">
                        <div class="dropdown-trigger">
                            <span class="selected-value">-- اختر المحافظة --</span>
                            <i class="fa-solid fa-chevron-down chevron"></i>
                        </div>
                        <div class="dropdown-options" id="gov-options">
                            <!-- Populated via JS -->
                        </div>
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label>رقم الهاتف (واتساب)</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-phone"></i>
                    <input type="tel" id="user-phone" placeholder="أدخل الرقم بدون مقدمة الدولة" required>
                    <span id="phone-prefix"
                        style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--primary-color); font-weight: bold; direction: ltr;"></span>
                    <div id="phone-status" class="validation-status" style="left: 60px;"></div>
                </div>
            </div>

            <div class="form-group">
                <label>العنوان التفصيلي</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-map-marked-alt"></i>
                    <input type="text" id="user-address" placeholder="الشارع، رقم المبنى، إلخ..." required>
                </div>
            </div>

            <button type="submit" class="btn-save" id="btn-save-profile">حفظ البيانات والانطلاق 🚀</button>
            <a href="javascript:history.back()" id="btn-cancel-edit"
                style="display:none; text-align:center; margin-top:12px; color:var(--text-muted); font-size:0.9rem; cursor:pointer; text-decoration:underline;">إلغاء
                والعودة</a>
        </form>

        <div class="loader-overlay" id="loading-overlay">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- Firebase JS Module -->
    <script type="module" src="js/profile.js?v=3"></script>
    <script src="js/theme.js?v=5"></script>
</body>

</html>

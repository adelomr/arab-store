<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر العرب</title>
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark-mode');
        }
    </script>
    <meta name="description" content="متجر تطبيقات احترافي لتحميل وتحديث التطبيقات بكل سهولة.">
    <!-- Favicon -->
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="web-assets/app_icon.png?v=2026">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css?v=5">
</head>

<body>
    <header>
        <div class="container navbar">
            <div class="logo-wrapper" style="display: flex; align-items: center; gap: 10px;">
                <a href="index.html?v=4" class="logo">
                    <img src="web-assets/app_icon.png?v=2026" alt="متجر العرب"
                        style="width:36px;height:36px;border-radius:10px;margin-left:8px;vertical-align:middle;">
                    متجر العرب
                </a>
                <button id="theme-toggle" class="theme-toggle" title="تبديل الوضع الليلي">
                    <i class="fa-solid fa-moon"></i>
                </button>
            </div>
            <div class="navbar-actions">
                <ul class="nav-links">
                    <li><a href="submit.html" style="color: var(--success-color); font-weight: bold;"><i
                                class="fa-solid fa-cloud-arrow-up"></i> أضف تطبيقك</a></li>

                    <li id="admin-link-li" class="hidden"><a href="admin.html?v=4"
                            style="color: var(--primary-color); font-weight: bold;"><i class="fa-solid fa-gauge"></i>
                            لوحة
                            التحكم</a></li>

                    <!-- Auth Section -->
                    <li id="auth-section">
                        <button id="btn-login" type="button" class="btn btn-primary">تسجيل الدخول <i
                                class="fa-brands fa-google"></i></button>
                        <div id="user-info" class="user-profile hidden">
                            <div class="notif-wrapper">
                                <button id="btn-notifications" class="notif-bell">
                                    <i class="fa-solid fa-bell"></i>
                                    <span class="notif-badge hidden" id="notif-badge">0</span>
                                </button>
                                <div class="notif-dropdown hidden" id="notif-dropdown">
                                    <div class="notif-header">الإشعارات</div>
                                    <div id="notif-list" class="notif-list">
                                        <div style="text-align: center; color: #777; padding: 10px;">جاري التحميل...
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="user-dropdown-wrapper" id="user-dropdown-wrapper">
                                <img id="user-avatar" src="" alt="صورة المستخدم" class="user-avatar">
                                <span id="user-name" class="hidden"></span>
                                <div class="user-dropdown-menu hidden" id="user-dropdown-menu">
                                    <div class="user-dropdown-header">حسابي</div>
                                    <ul class="user-dropdown-list">
                                        <li><a href="submit.html"><i class="fa-solid fa-plus"></i> إضافة تطبيق</a></li>
                                        <li><a href="update.html"><i class="fa-solid fa-pen-to-square"></i> تحديث
                                                تطبيق</a></li>
                                        <li><a href="user-apps.html"><i class="fa-solid fa-layer-group"></i>
                                                تطبيقاتي</a></li>
                                        <li class="dropdown-divider"></li>
                                        <li><button id="btn-logout" class="dropdown-item-btn"><i
                                                    class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</button>
                                        </li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container">
                <h1>اكتشف أفضل التطبيقات</h1>
                <p>متجر العرب هو وجهتك الأولى لتحميل أحدث التطبيقات الموثوقة والآمنة، مع نظام تحديثات ذكي وتقييمات
                    حقيقية.</p>
            </div>
        </section>

        <section class="container">
            <h2 class="section-title"><i class="fa-solid fa-rocket"></i> أحدث التطبيقات</h2>
            <div id="loader" class="loader-container">
                <span class="loader"></span>
            </div>
            <div id="apps-grid" class="apps-grid">
                <!-- Apps will be injected here via JS -->
            </div>
        </section>
    </main>

    <!-- JavaScript as module -->
    <script type="module" src="js/store.js?v=5"></script>
    <script src="js/theme.js?v=5"></script>
</body>

</html>
